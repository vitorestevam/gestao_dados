services:
  container:
    build: .
    stdin_open: true # Keeps STDIN open
    volumes:
      - ./src:/aula
      
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ":9001"